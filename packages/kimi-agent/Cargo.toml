[package]
name = "kimi-agent"
version = "0.1.0"
edition = "2024"
description = "Kimi Agent engine (Rust) — stateless turn loop with stdio JSON-RPC bridge"

[[bin]]
name = "kimi-agent"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
fastrand = "2"